{% extends 'accounts/base.html' %}

{% block title %}

Edit Profile

{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow">

            <div class="card-body">

                <h2 class="mb-4 text-center">

                    ✏️ Edit Profile

                </h2>

                <form method="POST">

                    {% csrf_token %}

                    {{ form.as_p }}

                    <button
                        type="submit"
                        class="btn btn-success w-100">

                        Save Changes

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
