{% extends 'accounts/base.html' %}

{% block title %}
Change Password
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow">

            <div class="card-body">

                <h2 class="text-center mb-4">

                    🔒 Change Password

                </h2>

                <form method="POST">

                    {% csrf_token %}

                    {{ form.as_p }}

                    <button
                        class="btn btn-success w-100"
                        type="submit">

                        Change Password

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
