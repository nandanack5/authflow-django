{% load static %}

<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <link rel="stylesheet" href="{% static 'accounts/css/login.css' %}">

</head>

<body>

<div class="login-container">

    <h1>Welcome Back 👋</h1>

    <form method="POST">

        {% csrf_token %}

        <input
            type="text"
            name="username"
            placeholder="Username"
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
        >

        <button type="submit">

            Login

        </button>

    </form>

</div>

</body>

</html>
